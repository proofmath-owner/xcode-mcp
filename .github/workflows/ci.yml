name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
        xcode-version: ['15.0', 'latest']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Select Xcode ${{ matrix.xcode-version }}
      if: matrix.xcode-version != 'latest'
      run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode-version }}.app
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build
      run: npm run build
    
    - name: Install SwiftLint
      run: brew install swiftlint swiftformat
    
    - name: Run tests
      run: npm test
      continue-on-error: true  # Tests might not be set up yet
    
    - name: Verify Xcode tools
      run: |
        xcodebuild -version
        xcrun simctl list devices
        swiftlint version
        swiftformat --version

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - run: npm ci
    - run: npm run build
