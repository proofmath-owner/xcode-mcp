name: Bug Report
description: File a bug report
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  
  - type: input
    id: xcode-version
    attributes:
      label: Xcode Version
      description: Which version of Xcode are you using?
      placeholder: ex. 15.2
    validations:
      required: true
  
  - type: input
    id: macos-version
    attributes:
      label: macOS Version
      description: Which version of macOS are you running?
      placeholder: ex. Sonoma 14.2
    validations:
      required: true
  
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
    validations:
      required: true
  
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Run command '...'
        2. See error
    validations:
      required: true
  
  - type: dropdown
    id: tool
    attributes:
      label: Which tool is affected?
      multiple: true
      options:
        - build_project
        - clean_project
        - list_simulators
        - boot_simulator
        - install_app
        - launch_app
        - analyze_swift_code
        - format_swift_code
        - run_swift_tests
        - create_swift_file
        - create_xcode_project
        - add_swift_package
        - Other
  
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output.
      render: shell
